name: Build and Test Docker Image

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: gitlab-hooks:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image - Health endpoint
      run: |
        # Start container in background
        docker run -d -p 8000:8000 --name gitlab-hooks-test gitlab-hooks:test
        
        # Wait for container to be ready
        echo "Waiting for container to start..."
        sleep 10
        
        # Check if container is running
        if ! docker ps | grep -q gitlab-hooks-test; then
          echo "Container failed to start"
          docker logs gitlab-hooks-test
          exit 1
        fi
        
        # Test health endpoint with retries
        max_attempts=30
        attempt=0
        while [ $attempt -lt $max_attempts ]; do
          if curl -f http://localhost:8000/health; then
            echo "Health endpoint responded successfully"
            break
          fi
          attempt=$((attempt + 1))
          echo "Attempt $attempt/$max_attempts failed, retrying in 2 seconds..."
          sleep 2
        done
        
        if [ $attempt -eq $max_attempts ]; then
          echo "Health endpoint failed after $max_attempts attempts"
          docker logs gitlab-hooks-test
          exit 1
        fi
        
        # Verify response contains expected content
        response=$(curl -s http://localhost:8000/health)
        if echo "$response" | grep -q '"status"'; then
          echo "Health check passed: $response"
        else
          echo "Health check response unexpected: $response"
          exit 1
        fi
        
        # Cleanup
        docker stop gitlab-hooks-test
        docker rm gitlab-hooks-test
    
    - name: Build and push Docker image to GHCR
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:${{ github.sha }}
          ghcr.io/${{ github.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Summary
      if: github.event_name == 'push'
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        echo "## 🐳 Docker Image Published to GHCR" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Docker image built, tested, and published successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`ghcr.io/${{ github.repository }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Latest:** \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**To pull and run:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "# Login to GHCR (use a GitHub Personal Access Token)" >> $GITHUB_STEP_SUMMARY
        echo "echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_USERNAME --password-stdin" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Pull the image" >> $GITHUB_STEP_SUMMARY
        echo "docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Or use latest" >> $GITHUB_STEP_SUMMARY
        echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Run the container" >> $GITHUB_STEP_SUMMARY
        echo "docker run -p 8000:8000 ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "View on [GitHub Container Registry](https://github.com/${{ github.repository }}/pkgs/container/$REPO_NAME)" >> $GITHUB_STEP_SUMMARY
    
    outputs:
      image-tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
      image-latest: ghcr.io/${{ github.repository }}:latest

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Prepare Release Body
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        RELEASE_BODY=$(cat <<EOF
        ## Docker Image Release
        
        **Tag:** ${{ github.ref_name }}
        **Commit:** ${{ github.sha }}
        
        ### Docker Image
        
        The Docker image is available on GitHub Container Registry:
        
        \`\`\`bash
        # Login to GHCR (use a GitHub Personal Access Token)
        echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_USERNAME --password-stdin
        
        # Pull the image
        docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
        
        # Or use latest
        docker pull ghcr.io/${{ github.repository }}:latest
        
        # Run the container
        docker run -p 8000:8000 ghcr.io/${{ github.repository }}:latest
        \`\`\`
        
        **Image:** \`ghcr.io/${{ github.repository }}:${{ github.sha }}\`  
        **Latest:** \`ghcr.io/${{ github.repository }}:latest\`
        
        View on [GitHub Container Registry](https://github.com/${{ github.repository }}/pkgs/container/$REPO_NAME)
        EOF
        )
        echo "$RELEASE_BODY" > release_body.md
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_body.md
        draft: false
        prerelease: false
        tag_name: ${{ github.ref_name }}

